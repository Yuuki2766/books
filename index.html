<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>書籍マネージャー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header id="main-header">
    <h1>📚 書籍マネージャー</h1>
    <div class="filter-group">
        <input type="text" id="search" placeholder="タイトル・作者・ジャンルで検索">
        
        <div class="view-settings">
            <div class="view-switch">
                <button id="btn-grid" class="active" onclick="setViewMode('grid')">⊞ グリッド</button>
                <button id="btn-list" onclick="setViewMode('list')">📖 本棚</button>
            </div>
            <div class="safe-mode-control">
                <label>
                    <input type="checkbox" id="r18Toggle">
                    <span class="safe-text">セーフモード：<span id="safe-status">ON</span></span>
                </label>
            </div>
        </div>

        <div class="select-row">
            <select id="publisherFilter">
                <option value="">全出版社</option>
                <option value="小学館">小学館</option>
                <option value="集英社">集英社</option>
                <option value="講談社">講談社</option>
                <option value="スクウェア・エニックス">スクウェア・エニックス</option>
                <option value="宝島社">宝島社</option>
                <option value="オーバーラップ">オーバーラップ文庫</option>
                <option value="KADOKAWA">KADOKAWA</option>
                <option value="電撃文庫">電撃文庫</option>
                <option value="角川スニーカー文庫">角川スニーカー文庫</option>
                <option value="ファンタジア文庫">ファンタジア文庫</option>
                <option value="GA文庫">GA文庫</option>
                <option value="メディアワークス文庫">メディアワークス文庫</option>
                <option value="双葉社">双葉社</option>
                <option value="実業之日本社">実業之日本社</option>
                <option value="ダッシュエックス文庫">ダッシュエックス文庫</option>
                <option value="HJ文庫">HJ文庫</option>
            </select>
            <select id="genreFilter">
                <option value="">全ジャンル</option>
                <option value="漫画">漫画</option>
                <option value="ミステリー">ミステリー</option>
                <option value="青春">青春</option>
                <option value="ファンタジー">ファンタジー</option>
                <option value="ラブコメ">ラブコメ</option>
                <option value="ライトノベル">ライトノベル</option>
                <option value="小説">小説</option>
                <option value="R18">🔞 非推奨内容</option>
            </select>
            <select id="sortFilter">
                <option value="default">標準</option>
                <option value="title">作品名順</option>
                <option value="favorite">お気に入り順</option>
                <option value="progress">収集率順</option>
            </select>
        </div>
    </div>
</header>

<main>
    <div id="list-view">
        <div id="summary"></div>
        <div id="book-list"></div>
    </div>

    <div id="detail-view" style="display: none;">
        <button class="back-btn" onclick="goBack()">← 一覧に戻る</button>
        <div id="detail-content"></div>
    </div>
</main>

<script src="script.js?v=13"></script>
</body>
</html>
