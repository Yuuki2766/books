<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>書籍マネージャー</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ⚡ スクロールで隠れるスマートヘッダー用の追加スタイル */
        #main-header {
            position: sticky;
            top: 0;
            z-index: 100;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        /* 下スクロール時にこのクラスをJSで付与して上に隠す */
        #main-header.scroll-hide {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none; /* 隠れている時はクリック判定を消す */
        }
    </style>
</head>
<body>
<header id="main-header">
    <h1>📚 書籍マネージャー</h1>
    <div class="filter-group">
        <input type="text" id="search" placeholder="タイトル・作者で検索">
        
        <div class="header-controls">
            <div class="safe-mode-area">
                <label>
                    <input type="checkbox" id="r18Toggle">
                    セーフモード：<span id="safe-status">ON</span>
                </label>
                <label style="margin-left: 15px;">
                    <input type="checkbox" id="depressToggle" checked>
                    鬱展開を隠す
                </label>
            </div>
            <div class="view-mode-btns">
                <button onclick="changeMainView('list')" id="btn-list-view" class="active">一覧</button>
                <button onclick="changeMainView('slide')" id="btn-slide-view">スライド</button>
            </div>
        </div>

        <div class="select-row">
            <select id="publisherFilter">
                <option value="">全出版社</option>
                <option value="小学館">小学館</option>
                <option value="集英社">集英社</option>
                <option value="講談社">講談社</option>
                <option value="スクウェア・エニックス">スクウェア・エニックス</option>
                <option value="宝島社">宝島社</option>
                <option value="オーバーラップ">オーバーラップ</option>
                <option value="ホビージャパン">ホビージャパン</option>
                <option value="KADOKAWA">KADOKAWA</option>
                <option value="電撃文庫">電撃文庫</option>
                <option value="ガガガ文庫">ガガガ文庫</option>
                <option value="ファンタジア文庫">ファンタジア文庫</option>
                <option value="スニーカー文庫">スニーカー文庫</option>
                <option value="MF文庫J">MF文庫J</option>
                <option value="ファミ通文庫">ファミ通文庫</option>
                <option value="GA文庫">GA文庫</option>
                <option value="メディアワークス文庫">メディアワークス文庫</option>
                <option value="HJ文庫">HJ文庫</option>
                <option value="電撃コミックス">電撃コミックス</option>
                <option value="小説家になろう">小説家になろう</option>
                <option value="カクヨム">カクヨム</option>
            </select>
            <select id="genreFilter">
                <option value="">全ジャンル</option>
                <option value="漫画">漫画</option>
                <option value="推理">推理</option>
                <option value="青春">青春</option>
                <option value="日常">日常</option>
                <option value="ファンタジー">ファンタジー</option>
                <option value="恋愛">恋愛</option>
                <option value="ライトノベル">ライトノベル</option>
                <option value="小説">小説</option>
                <option value="ネット">ネット</option>
                <option value="R18">R18</option>
                <option value="鬱">鬱</option>
            </select>
            <select id="sortFilter">
                <option value="default">標準</option>
                <option value="title">作品名順</option>
                <option value="author">作者順</option>
                <option value="favorite">お気に入り順</option>
                <option value="progress">収集率順</option>
            </select>
            
            <label id="edit-mode-label" style="display: inline-flex; align-items: center; justify-content: center; background: #333; color: #aaa; padding: 0 12px; border-radius: 8px; font-size: 14px; cursor: pointer; border: 1px solid #444; height: 42px; box-sizing: border-box; user-select: none;">
                <input type="checkbox" id="editModeToggle" onchange="toggleEditModeUi()" style="margin-right: 6px; cursor: pointer;"> 
                <span>🛠️ 編集</span>
            </label>
        </div>

        <div class="admin-link-row" style="text-align: right; margin-top: 12px; font-size: 14px;">
            <a href="#admin" id="link-admin-view" style="color: #a5b4fc; text-decoration: none; font-weight: bold;">⚙️ 新規書籍の追加・エクスポート画面</a>
        </div>
    </div>
</header>

<main>
    <div id="list-view">
        <div id="summary"></div>
        <div id="book-list"></div>
    </div>

    <div id="slide-view" style="display: none;">
        <div id="genre-rows-container"></div>
    </div>

    <div id="detail-view" style="display: none;">
        <button class="back-btn" onclick="goBack()">← 一覧に戻る</button>
        <div id="detail-content"></div>
    </div>

    <div id="admin-view" style="display: none; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 10px; color: #222;">
        <button class="back-btn" onclick="goBack()">← マネージャーに戻る</button>
        
        <h2 style="margin-top: 10px; font-size: 20px; border-bottom: 2px solid #4f46e5; padding-bottom: 8px;">⚙️ ローカルデータ管理・エクスポート</h2>
        
        <div style="background: #eef2ff; border: 1px solid #c7d2fe; padding: 15px; border-radius: 8px; margin-bottom: 25px; font-size: 14px;">
            <h3 style="margin: 0 0 10px 0; font-size: 15px; color: #4f46e5;">📋 GitHub（books.json）への反映手順</h3>
            <p style="margin: 0 0 12px 0; color: #374151; line-height: 1.4;">
                ここで追加・並び替えた最新データをGitHubに保存します。<br>
                下のボタンを押して最新のJSONデータをコピーし、GitHubの <code>books.json</code> に上書き保存（Commit）してください。
            </p>
            <button type="button" onclick="copyJsonToClipboard()" style="padding: 10px 16px; background: #4f46e5; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">
                📋 最新のJSONデータを一発コピーする
            </button>
            <button type="button" onclick="clearLocalChanges()" style="padding: 10px 16px; background: #ef4444; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-left:10px;">
                ⚠️ ローカルの変更をリセットして最初から読み直す
            </button>
        </div>

        <h3 style="font-size: 16px; margin-bottom: 12px; color: #1e293b;">📝 新しい作品の追加</h3>
        <form id="add-book-form" style="display: flex; flex-direction: column; gap: 12px; max-width: 500px;">
            <div>
                <label style="display:block; font-size:13px; font-weight:bold; margin-bottom:4px;">タイトル *</label>
                <input type="text" id="new-title" required style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px; box-sizing: border-box;">
            </div>
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label style="display:block; font-size:13px; font-weight:bold; margin-bottom:4px;">作者</label>
                    <input type="text" id="new-author" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px; box-sizing: border-box;">
                </div>
                <div style="flex: 1;">
                    <label style="display:block; font-size:13px; font-weight:bold; margin-bottom:4px;">イラストレーター</label>
                    <input type="text" id="new-illustrator" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px; box-sizing: border-box;">
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label style="display:block; font-size:13px; font-weight:bold; margin-bottom:4px;">レーベル・出版社</label>
                    <input type="text" id="new-publisher" placeholder="例: カクヨム, ガガガ文庫" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px; box-sizing: border-box;">
                </div>
                <div style="flex: 1;">
                    <label style="display:block; font-size:13px; font-weight:bold; margin-bottom:4px;">ジャンル (スラッシュ区切り)</label>
                    <input type="text" id="new-genre" placeholder="例: 青春/ライトノベル" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px; box-sizing: border-box;">
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label style="display:block; font-size:13px; font-weight:bold; margin-bottom:4px;">既刊・所持巻数 (カンマ区切り)</label>
                    <input type="text" id="new-owned" placeholder="例: 1, 2, 3" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px; box-sizing: border-box;">
                </div>
                <div style="flex: 1;">
                    <label style="display:block; font-size:13px; font-weight:bold; margin-bottom:4px;">総巻数</label>
                    <input type="number" id="new-total" value="1" min="1" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px; box-sizing: border-box;">
                </div>
            </div>
            <div>
                <label style="display:block; font-size:13px; font-weight:bold; margin-bottom:4px;">画像ファイルパス</label>
                <input type="text" id="new-image" placeholder="例: images/cover.jpg" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px; box-sizing: border-box;">
            </div>
            <div>
                <label style="display:block; font-size:13px; font-weight:bold; margin-bottom:4px;">あらすじ</label>
                <textarea id="new-summary" rows="3" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px; font-family:sans-serif; box-sizing: border-box;"></textarea>
            </div>
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label style="display:block; font-size:13px; font-weight:bold; margin-bottom:4px;">PDF/TXTのURLパス</label>
                    <input type="text" id="new-pdf" placeholder="例: pdfs/filename.txt" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px; box-sizing: border-box;">
                </div>
                <div style="flex: 1;">
                    <label style="display:block; font-size:13px; font-weight:bold; margin-bottom:4px;">作品の公式URL</label>
                    <input type="text" id="new-info" placeholder="例: https://kakuyomu.jp/..." style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px; box-sizing: border-box;">
                </div>
            </div>
            
            <div style="display: flex; gap: 20px; margin: 5px 0;">
                <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                    <input type="checkbox" id="new-depress"> 鬱展開属性を付与
                </label>
                <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                    <input type="checkbox" id="new-favorite"> 最初からお気に入りに登録
                </label>
            </div>

            <button type="button" onclick="addNewBookLocal()" style="padding: 12px; background: #10b981; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                ➕ このブラウザのリストに直接追加する
            </button>
        </form>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
