<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>読書ビューア</title>
    <style>
        body {
            background-color: #f4f1e6; /* 目に優しいクリーム色の背景 */
            color: #333;
            display: flex;
            justify-content: center;
            margin: 0;
            font-family: "Sawarabi Mincho", "Hiragino Mincho ProN", serif;
        }
        #content {
            max-width: 750px;
            width: 90%;
            padding: 50px 40px;
            background: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
            /* 行間を「空きすぎず、詰まりすぎず」に設定 */
            line-height: 1.8; 
            white-space: pre-wrap; /* TXTの改行をそのまま反映 */
            font-size: 19px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div id="content">読み込み中...</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const file = urlParams.get('file');

        if (file) {
            fetch(file)
                .then(response => {
                    if (!response.ok) throw new Error();
                    return response.text();
                })
                .then(text => {
                    document.getElementById('content').textContent = text;
                    // ファイル名からタイトルを推測して表示
                    document.title = file.replace(/\.[^/.]+$/, ""); 
                })
                .catch(() => {
                    document.getElementById('content').textContent = "エラー: ファイルが見つからないか、読み込めませんでした。";
                });
        }
    </script>
</body>
</html>
