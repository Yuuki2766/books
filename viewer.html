<script>
    const urlParams = new URLSearchParams(window.location.search);
    const file = urlParams.get('file');

    if (file) {
        fetch(file)
            .then(res => {
                if (!res.ok) throw new Error();
                return res.text();
            })
            .then(text => {
                // --- 修正ポイント：ちょうどいい改行の調整 ---
                
                // 1. まず、4行以上空いているような異常な連続改行を「2行空き（改行3つ）」にまとめる
                let cleanedText = text.replace(/\n{4,}/g, '\n\n\n');
                
                // 2. もし全体的に詰まりすぎていると感じる場合は、
                // 全ての単一改行を「改行＋空行」に変換する（Web小説風にする）
                // cleanedText = cleanedText.replace(/\n/g, '\n\n');

                document.getElementById('content').textContent = cleanedText;
                document.title = file.split('/').pop().replace('.txt', '');
            })
            .catch(() => {
                document.getElementById('content').textContent = "エラー: ファイルを読み込めませんでした。";
            });
    }
</script>
