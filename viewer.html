<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>読書ビューア</title>
    <style>
        body {
            background-color: #f4f1e6;
            color: #333;
            display: flex;
            justify-content: center;
            margin: 0;
            font-family: "Sawarabi Mincho", "Hiragino Mincho ProN", serif;
        }
        #content {
            max-width: 800px;
            width: 90%;
            padding: 50px 40px;
            background: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
            line-height: 2.2;
            white-space: pre-wrap;
            font-size: 19px;
            word-break: break-all;

            /* 【解決策：インデントの調整】 */
            /* タブ文字の幅を全角スペース1個分（2文字分）に固定 */
            tab-size: 2;
            -moz-tab-size: 2;

            /* もし「1行目だけ1文字下げて、2行目以降は左に揃えたい」なら */
            /* text-indent: 1em; */
            
            /* もし「2行目以降も1行目の開始位置（スペースの後）に合わせたい」場合、
            TXT側のスペースを削除して、CSS側で制御するのが最も綺麗です */
        }
    </style>
</head>
<body>
    <div id="content">読み込み中...</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const file = urlParams.get('file');

        if (file) {
            fetch(file)
                .then(res => {
                    if (!res.ok) throw new Error();
                    return res.text();
                })
                .then(text => {
                    // 【調整ポイント2】
                    // すべての改行を「2連続改行」に置換します。
                    // これにより、元のTXTで1回改行されていた場所が「1行空き」になり、
                    // Web小説らしいゆったりした配置になります。
                    let spacedText = text.replace(/\n/g, '\n\n');

                    // もし「空きすぎ」と感じる場合は、下の行を有効にして上を消してください。
                    // let spacedText = text.replace(/\n{2,}/g, '\n\n\n'); 

                    document.getElementById('content').textContent = spacedText;
                    document.title = file.split('/').pop().replace('.txt', '');
                })
                .catch(() => {
                    document.getElementById('content').textContent = "エラー: ファイルを読み込めませんでした。";
                });
        }
    </script>
</body>
</html>
